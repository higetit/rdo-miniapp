<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#17212b" />
  <title>RDO Companion</title>
  <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <header class="topbar" id="topbar">
    <button class="icon-btn" id="btn-back" hidden aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="topbar-title">
      <div class="title-main" id="title-main">RDO Companion</div>
      <div class="title-sub" id="title-sub">Red Dead Online</div>
    </div>
    <button class="icon-btn" id="btn-reload" aria-label="Reload"><i class="fa-solid fa-arrows-rotate"></i></button>
  </header>

  <nav class="chips-row" id="chips-row" aria-label="Sections">
    <button class="chip-tab active" data-view="map"><i class="fa-solid fa-map"></i><span>Map</span></button>
    <button class="chip-tab" data-view="nazar"><i class="fa-solid fa-eye"></i><span>Madam Nazar</span></button>
    <button class="chip-tab" data-view="legendary"><i class="fa-solid fa-paw"></i><span>Legendary</span></button>
    <button class="chip-tab" data-view="cards"><i class="fa-solid fa-layer-group"></i><span>Cards</span></button>
    <button class="chip-tab" data-view="events"><i class="fa-solid fa-calendar-days"></i><span>Events</span></button>
    <button class="chip-tab" data-view="pamphlets"><i class="fa-solid fa-scroll"></i><span>Pamphlets</span></button>
    <button class="chip-tab" data-view="weekly"><i class="fa-solid fa-box-open"></i><span>Weekly</span></button>
    <button class="chip-tab" data-view="jewelry"><i class="fa-solid fa-gem"></i><span>Jewelry</span></button>
    <button class="chip-tab" data-view="cycles"><i class="fa-solid fa-arrows-rotate"></i><span>Cycles</span></button>
  </nav>

  <main class="stage" id="stage">
    <section class="panel panel-map active" id="panel-map">
      <iframe
        id="map-frame"
        src="https://jeanropke.github.io/RDR2CollectorsMap/?lang=en-US&theme=detailed"
        title="RDO Collectors Map"
        referrerpolicy="no-referrer-when-downgrade"
        allow="geolocation; fullscreen"
      ></iframe>
      <div class="frame-loader" id="frame-loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading map…</div>
      </div>
    </section>

    <section class="panel panel-content" id="panel-content">
      <div class="scroll-area" id="content-body"></div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="js/telegram.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/ui.js?v=4"></script>
  <script src="js/content.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
